stages:
  - test
  - deploy

test:
  stage: test
  image: node:24-alpine
  only:
    - main
    - develop
  script:
    - cd api
    - npm install
    - npm test || true

deploy:
  stage: deploy
  image: docker:24
  only:
    - main
  services:
    - docker:24-dind
  before_script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl
    - mv kubectl /usr/local/bin/
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG" > ~/.kube/config
  script:
    - docker build -t kentonnnn/etnair-api:latest ./api
    - docker push kentonnnn/etnair-api:latest
    - docker build -t kentonnnn/etnair-frontend:latest ./frontend
    - docker push kentonnnn/etnair-frontend:latest
    - kubectl apply -f k8s/
  after_script:
    - docker logout