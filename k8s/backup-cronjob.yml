apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgresql-backup
spec:
  schedule: "0 2 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: postgres:16
            env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: etnair-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: etnair-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: etnair-secrets
                  key: POSTGRES_DB
            command:
            - /bin/sh
            - -c
            - |
              BACKUP_FILE="/backup/etnair-$(date +%Y%m%d-%H%M%S).sql"
              PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h postgresql -U $POSTGRES_USER $POSTGRES_DB > $BACKUP_FILE
              echo "Backup saved: $BACKUP_FILE"
            volumeMounts:
            - name: backup-storage
              mountPath: /backup
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            hostPath:
              path: /var/backups/etnair
              type: DirectoryOrCreate